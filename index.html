<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #fcfbf9; /* Un tono crema más fino */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #5b5f48;
            margin: 0;
            text-align: center;
        }
        .hero {
            padding: 60px 20px;
        }
        .logo-img {
            width: 120px; /* Logo más pequeño y delicado */
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .cta-btn {
            background-color: #8a8d79;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
        }
        .cta-btn:hover { background-color: #5b5f48; }
        
        /* Estilo de lista más limpio */
        ul { list-style: none; padding: 0; }
        li { margin: 15px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <section class="hero">
        <img src="logo.png" class="logo-img" alt="Logo">
        <h1>A.V.E.</h1>
        <p>El equilibrio entre la salud de tu piel y tu bienestar integral.</p>
        <br><br>
        <a href="#contacto" class="cta-btn">Reservar Turno</a>
    </section>

    <section>
        <h2 class="section-title">Nuestros Tratamientos</h2>
        <ul>
            <li>✨ Limpieza Profunda</li>
            <li>✨ Rejuvenecimiento Facial</li>
            <li>✨ Terapias de Bienestar</li>
        </ul>
    </section>

</body>
</html>
